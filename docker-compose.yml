version: "3.8"

services:
  api_gateway:
    build: ./api_gateway
    container_name: api_gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth_service
      - orders_service
      - redis
    env_file:
      - ./api_gateway/.env.docker

  auth_service:
    build: ./auth_service
    container_name: auth_service
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./auth_service/.env.docker

  orders_service:
    build: ./orders_service
    container_name: orders_service
    ports:
      - "3002:3002"
    depends_on:
      - redis
    env_file:
      - ./orders_service/.env.docker

  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis-server
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data: